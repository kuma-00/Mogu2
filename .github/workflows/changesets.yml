name: Changesets

on:
  push:
    branches:
      - main

concurrency:
  group: changesets-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      hasChangesets: ${{ steps.changesets.outputs.hasChangesets }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Create Version PR
        id: changesets
        uses: changesets/action@v1
        with:
          # changesets/action needs a publish command to expose hasChangesets=false on release commits.
          # Actual publishing is done by build-native and publish-main jobs.
          version: bun run version-packages
          publish: bun run echo-noop
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-native:
    needs: release
    if: needs.release.outputs.hasChangesets == 'false'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            pkg: mogu-ffi-darwin-arm64
            lib: libmogu_ffi.dylib

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            pkg: mogu-ffi-linux-x64
            lib: libmogu_ffi.so

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            pkg: mogu-ffi-win32-x64
            lib: mogu_ffi.dll

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          cache-on-failure: true

      - name: Build FFI library
        run: cargo build --release --package mogu-ffi --target ${{ matrix.target }}

      - name: Copy library to package dir
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.lib }} \
             packages/${{ matrix.pkg }}/

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"
          scope: "@kuma-00"

      - uses: oven-sh/setup-bun@v2

      - name: Publish native package
        working-directory: packages/${{ matrix.pkg }}
        run: npm publish --access restricted
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}

  publish-main:
    needs: [release, build-native]
    if: needs.release.outputs.hasChangesets == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"
          scope: "@kuma-00"

      - uses: oven-sh/setup-bun@v2

      - name: Publish main package and create GitHub Release
        run: bun run publish-main
        env:
          GITHUB_TOKEN: ${{ github.token }}
          NODE_AUTH_TOKEN: ${{ github.token }}
