name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      release_upload_url: ${{ steps.release.outputs.release_upload_url }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-native:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            pkg: mogu-ffi-darwin-arm64
            lib: libmogu_ffi.dylib

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            pkg: mogu-ffi-linux-x64
            lib: libmogu_ffi.so

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            pkg: mogu-ffi-win32-x64
            lib: mogu_ffi.dll

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          cache-on-failure: true

      - name: Build FFI library
        run: cargo build --release --package mogu-ffi --target ${{ matrix.target }}

      - name: Copy library to package dir
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.lib }} \
             packages/${{ matrix.pkg }}/

      - uses: oven-sh/setup-bun@v2

      - name: Smoke test library loading
        shell: bash
        run: |
          bun --version
          bun --eval "
          import { FoodDetector } from './packages/mogu-bun/index.ts';
          console.log('✅ FoodDetector imported successfully');
          console.log('Library path loaded from local build');
          // FoodDetector は生成しないが、import 時点で findLibrary() と dlopen() は実行されるため、共有ライブラリの探索とロード確認にはなる
          "

      - name: Configure npm for GitHub Packages
        shell: bash
        run: |
          cat > .npmrc <<'EOF'
          @kuma-00:registry=https://npm.pkg.github.com
          //npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}
          always-auth=true
          EOF
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}

      - name: Read package name and version
        id: pkg-info
        shell: bash
        run: |
          cd packages/${{ matrix.pkg }}
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Package: $NAME@$VERSION"

      - name: Check if package version exists in registry
        id: check-registry
        shell: bash
        run: |
          NAME="${{ steps.pkg-info.outputs.name }}"
          VERSION="${{ steps.pkg-info.outputs.version }}"
          if npm view "$NAME@$VERSION" version --registry=https://npm.pkg.github.com > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Package $NAME@$VERSION already exists in registry, skipping publish"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Package $NAME@$VERSION not found in registry, will publish"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}

      - name: Publish native package
        if: steps.check-registry.outputs.exists == 'false'
        working-directory: packages/${{ matrix.pkg }}
        run: npm publish --access restricted --registry=https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-main:
    needs: [release-please, build-native]
    if: needs.release-please.outputs.releases_created == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Configure npm for GitHub Packages
        shell: bash
        run: |
          cat > .npmrc <<'EOF'
          @kuma-00:registry=https://npm.pkg.github.com
          //npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}
          always-auth=true
          EOF
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}

      - name: Publish main package
        run: bun run publish-main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
