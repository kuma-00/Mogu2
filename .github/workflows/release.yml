name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  verify-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.verify.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Verify tag matches package version
        id: verify
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          TAG_VERSION="${TAG#v}"
          PKG_VERSION=$(node -p "require('./packages/mogu-bun/package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json ($PKG_VERSION)"
            exit 1
          fi
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version $TAG_VERSION"

  build-native:
    needs: verify-version
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            pkg: mogu-ffi-darwin-arm64
            lib: libmogu_ffi.dylib

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            pkg: mogu-ffi-linux-x64
            lib: libmogu_ffi.so

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            pkg: mogu-ffi-win32-x64
            lib: mogu_ffi.dll

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build FFI library
        run: cargo build --release --package mogu-ffi --target ${{ matrix.target }}

      - name: Copy library to package dir
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.lib }} \
             packages/${{ matrix.pkg }}/

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"
          scope: "@kuma-00"

      - name: Publish native package
        working-directory: packages/${{ matrix.pkg }}
        run: npm publish --access restricted
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}

  publish-main:
    needs: [verify-version, build-native]
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"
          scope: "@kuma-00"
      - name: Debug auth
        run: |
          echo "actor=${{ github.actor }}"
          npm whoami --registry=https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}

      - name: Publish @kuma-00/mogu-bun
        working-directory: packages/mogu-bun
        run: npm publish --access restricted
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}

  create-github-release:
    needs: [verify-version, publish-main]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Extract release notes
        run: node scripts/extract-changelog-section.mjs ${{ needs.verify-version.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          body_path: release-notes.md
          generate_release_notes: false
